<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('fonts/Valentine.otf') format ('opentype'), url('fonts/Valentine.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
               Tipos de Format()
               - opentype (otf)
               - truetype (ttf)
               - embedded-opentype
               - truetype-aat (Apple advance Typhography)
               - svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }

    </style>
</head>
<body>
    <h1>Olá Raphael</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Impedit, eum perspiciatis fuga ipsum laborum temporibus qui aliquam, nihil possimus rerum repellat sint, omnis vitae? Veniam alias magnam deserunt distinctio ea?</p>
</body>
</html>
