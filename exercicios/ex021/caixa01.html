<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{ /* Box-Level */
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border: 10px solid darkslategray;

            padding: 10px; /*Topo > direita > embaixo > esquerda*/ 
            /*(Se os quatro lados for iguais pode deixar */

            margin: 20px auto 40px auto; /*Se quiser centralizar só colocar auto no left e rigth*/

            outline: 5px dashed salmon;
        }

        a{ /* Inline- level */
            border: 10px solid red;

            padding: 10px;

        }
    </style>
</head>
<body>
    <h1>Exemplo de box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
